<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="pi-site-verification" content="YAKO_HAPA" />
    <title>ENKRO HUB - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-nav { color: #4338ca; }
        .notification-dot { position: absolute; top: -1px; right: 1px; width: 7px; height: 7px; background-color: red; border-radius: 50%; border: 1px solid white; }
    </style>
</head>
<body class="bg-gray-50 pb-24 font-sans">

    <header class="bg-indigo-900 p-4 sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-3">
            <div class="flex-1 relative">
                <input type="text" placeholder="Tafuta kwenye ENKRO Hub..." class="w-full p-2 pl-10 rounded-full text-sm outline-none border-none">
                <i class="fas fa-search absolute left-4 top-2.5 text-gray-400 text-xs"></i>
            </div>
            <i class="fas fa-comment-dots text-white text-xl"></i>
        </div>
    </header>

    <div class="p-4 bg-indigo-900 rounded-b-[2rem] shadow-lg mb-4">
        <div class="bg-white/10 p-4 rounded-2xl border border-white/10 backdrop-blur-sm text-white">
            <p class="text-[10px] opacity-70 uppercase tracking-widest font-bold">Pi Balance</p>
            <div class="flex justify-between items-center mt-1">
                <h2 class="text-2xl font-bold">1,250.00 π</h2>
                <button class="bg-indigo-600 text-[10px] px-3 py-1 rounded-full font-bold">View Wallet</button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-5 gap-2 px-4 mb-6">
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mb-1">
                <i class="fas fa-mobile-alt text-sm"></i>
            </div>
            <span class="text-[9px] font-bold text-gray-600">Simu</span>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-1">
                <i class="fas fa-tshirt text-sm"></i>
            </div>
            <span class="text-[9px] font-bold text-gray-600">Mavazi</span>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-1">
                <i class="fas fa-seedling text-sm"></i>
            </div>
            <span class="text-[9px] font-bold text-gray-600">Kilimo</span>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mb-1">
                <i class="fas fa-laptop text-sm"></i>
            </div>
            <span class="text-[9px] font-bold text-gray-600">Vifaa</span>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 bg-pink-100 text-pink-600 rounded-full flex items-center justify-center mb-1">
                <i class="fas fa-ellipsis-h text-sm"></i>
            </div>
            <span class="text-[9px] font-bold text-gray-600">Zaidi</span>
        </div>
    </div>

    <div class="px-4">
        <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
            <i class="fas fa-fire text-orange-500"></i> Bidhaa Zinazovuma
        </h3>
        <div class="grid grid-cols-2 gap-3">
            
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400" class="w-full h-32 object-cover" alt="Phone">
                <div class="p-2">
                    <h4 class="text-[11px] font-bold text-gray-700 truncate">iPhone 15 Pro Max</h4>
                    <p class="text-indigo-600 font-extrabold text-sm mt-1">2.5 π</p>
                    <button class="w-full bg-indigo-700 text-white text-[10px] py-1.5 rounded-lg mt-2 font-bold hover:bg-indigo-800">Nunua</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" class="w-full h-32 object-cover" alt="Headphones">
                <div class="p-2">
                    <h4 class="text-[11px] font-bold text-gray-700 truncate">Sony Headphones</h4>
                    <p class="text-indigo-600 font-extrabold text-sm mt-1">0.8 π</p>
                    <button class="w-full bg-indigo-700 text-white text-[10px] py-1.5 rounded-lg mt-2 font-bold hover:bg-indigo-800">Nunua</button>
                </div>
            </div>

        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 py-3 px-2 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)] z-[100]">
        <a href="#" class="flex flex-col items-center text-indigo-700 w-1/6">
            <i class="fas fa-home text-base"></i>
            <span class="text-[9px] font-bold mt-1">Home</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400 w-1/6">
            <i class="fas fa-th-large text-base"></i>
            <span class="text-[9px] font-bold mt-1">Aina</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400 relative w-1/6">
            <i class="fas fa-shopping-cart text-base"></i>
            <span class="notification-dot"></span>
            <span class="text-[9px] font-bold mt-1 text-center">Cart</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400 relative w-1/6">
            <i class="fas fa-bell text-base"></i>
            <span class="notification-dot"></span>
            <span class="text-[9px] font-bold mt-1">Taarifa</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400 w-1/6">
            <i class="fas fa-wallet text-base"></i>
            <span class="text-[9px] font-bold mt-1 text-center">Wallet</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400 w-1/6">
            <div class="w-5 h-5 bg-gray-200 rounded-full flex items-center justify-center border border-gray-300">
                <i class="fas fa-user text-[10px]"></i>
            </div>
            <span class="text-[9px] font-bold mt-1">Profile</span>
        </a>
    </nav>

</body>
</html>
