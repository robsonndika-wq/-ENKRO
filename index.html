<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="pi-site-verification" content="YAKO_HAPA" />
    <title>ENKRO Hub - Super App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-nav { color: #4338ca; }
        .notification-dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background-color: red; border-radius: 50%; }
    </style>
</head>
<body class="bg-gray-100 pb-24 font-sans">

    <header class="bg-indigo-900 text-white p-6 rounded-b-[2rem] shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold italic tracking-wider text-indigo-100">ENKRO HUB</h1>
                <p class="text-xs opacity-70">Pi Network Ecosystem</p>
            </div>
            <div class="bg-indigo-800 p-2 rounded-full px-4 border border-indigo-700 shadow-inner">
                <span class="text-sm font-bold">1,250.00 π</span>
            </div>
        </div>
        
        <div class="bg-indigo-800 bg-opacity-50 p-5 rounded-2xl border border-indigo-700">
            <p class="text-xs opacity-60 uppercase font-bold tracking-widest">Pi Balance</p>
            <div class="flex justify-between items-center mt-1">
                <h2 class="text-3xl font-extrabold">1,250.00 π</h2>
                <button class="bg-white text-indigo-900 px-4 py-1.5 rounded-full text-xs font-bold shadow-lg">
                    View Wallet
                </button>
            </div>
        </div>
    </header>

    <div class="px-4 -mt-4 space-y-4">
        <div class="bg-orange-600 rounded-2xl p-5 text-white shadow-lg flex justify-between items-center relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-xs opacity-80 uppercase font-bold">Total Expenditure</p>
                <h3 class="text-2xl font-bold mt-1">295,500.00 π</h3>
                <a href="#" class="text-[10px] mt-2 block opacity-90 underline italic">View Order History ></a>
            </div>
            <i class="fas fa-wallet text-6xl absolute -right-4 opacity-10"></i>
        </div>

        <div class="bg-teal-600 rounded-2xl p-5 text-white shadow-lg flex justify-between items-center relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-xs opacity-80 uppercase font-bold">Total Marketplace Rank</p>
                <h3 class="text-2xl font-bold mt-1">Silver Seller 3</h3>
                <a href="#" class="text-[10px] mt-2 block opacity-90 underline italic">Rank History ></a>
            </div>
            <i class="fas fa-award text-6xl absolute -right-4 opacity-10"></i>
        </div>
    </div>

    <div class="p-4 grid grid-cols-4 gap-2 mt-2 text-center">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center text-indigo-600 mb-1">
                <i class="fas fa-bolt"></i>
            </div>
            <span class="text-[10px] text-gray-600 font-bold">Flash Deal</span>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center text-orange-500 mb-1">
                <i class="fas fa-fire"></i>
            </div>
            <span class="text-[10px] text-gray-600 font-bold">Trending</span>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center text-green-500 mb-1">
                <i class="fas fa-check-circle"></i>
            </div>
            <span class="text-[10px] text-gray-600 font-bold">Verified</span>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center text-purple-600 mb-1">
                <i class="fas fa-ellipsis-h"></i>
            </div>
            <span class="text-[10px] text-gray-600 font-bold">More</span>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 py-3 px-6 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)] z-[100]">
        <a href="#" class="flex flex-col items-center active-nav">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[10px] font-bold mt-1">Nyumbani</span>
        </a>

        <a href="#" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-th-large text-lg"></i>
            <span class="text-[10px] font-bold mt-1">Aina</span>
        </a>

        <a href="#" class="flex flex-col items-center text-gray-400 relative">
            <i class="fas fa-shopping-cart text-lg"></i>
            <span class="notification-dot"></span>
            <span class="text-[10px] font-bold mt-1">Cart (2)</span>
        </a>

        <a href="#" class="flex flex-col items-center text-gray-400 relative">
            <i class="fas fa-bell text-lg"></i>
            <span class="notification-dot"></span>
            <span class="text-[10px] font-bold mt-1">Taarifa</span>
        </a>

        <a href="#" class="flex flex-col items-center text-gray-400">
            <div class="w-6 h-6 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden border border-gray-300">
                <i class="fas fa-user text-[12px] text-gray-500"></i>
            </div>
            <span class="text-[10px] font-bold mt-1 text-gray-400">Akaunti</span>
        </a>
    </nav>

</body>
</html>
